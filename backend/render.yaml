services:
  - type: web
    name: jira-clone-api
    plan: free
    env: python
    region: oregon
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python run.py"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jira-clone-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: "https://your-vercel-domain.vercel.app" # UPDATE THIS after Vercel deployment

databases:
  - name: jira-clone-db
    plan: free
    region: oregon
